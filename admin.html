<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — PrintBag DZ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box}
    body{font-family:'Cairo',sans-serif;background:#050010;min-height:100vh;color:#fff}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:linear-gradient(rgba(139,92,246,.06) 1px,transparent 1px),
      linear-gradient(90deg,rgba(139,92,246,.06) 1px,transparent 1px);background-size:50px 50px}
    .glass{background:rgba(255,255,255,.04);backdrop-filter:blur(18px);
      border:1px solid rgba(139,92,246,.2);box-shadow:0 4px 32px rgba(109,40,217,.08)}
    .field{background:rgba(255,255,255,.06);border:1.5px solid rgba(139,92,246,.25);
      color:#ede9fe;border-radius:12px;padding:12px 16px;
      font-family:'Cairo',sans-serif;font-size:.9rem;width:100%;transition:border-color .2s}
    .field::placeholder{color:rgba(196,181,253,.3)}
    .field:focus{outline:none;border-color:#a78bfa;box-shadow:0 0 0 3px rgba(167,139,250,.15)}
    .field option{background:#0d0025;color:#ede9fe}
    .btn-purple{background:linear-gradient(135deg,#7c3aed,#5b21b6);
      box-shadow:0 4px 20px rgba(124,58,237,.35);transition:all .2s;border:none;cursor:pointer;color:#fff}
    .btn-purple:hover{background:linear-gradient(135deg,#8b5cf6,#6d28d9);transform:translateY(-1px)}
    .mono{font-family:'Space Mono',monospace}
    .stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(139,92,246,.2);border-radius:18px;padding:20px;text-align:center}
    .tbl-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;min-width:1000px}
    thead tr{background:rgba(76,29,149,.25)}
    th{padding:14px 12px;text-align:right;font-weight:900;font-size:.78rem;color:#a78bfa;letter-spacing:.03em;white-space:nowrap}
    tbody tr{border-bottom:1px solid rgba(139,92,246,.1);transition:background .15s}
    tbody tr:hover{background:rgba(124,58,237,.07)}
    td{padding:10px 12px;vertical-align:middle}
    .badge{display:inline-block;padding:3px 12px;border-radius:999px;font-size:.72rem;font-weight:700;border:1px solid}
    .badge-pending{background:rgba(234,179,8,.12);color:#fcd34d;border-color:rgba(234,179,8,.3)}
    .badge-sent{background:rgba(34,197,94,.12);color:#86efac;border-color:rgba(34,197,94,.3)}
    .action-btn{padding:5px 10px;border-radius:8px;font-size:.72rem;font-weight:700;
      cursor:pointer;transition:all .2s;border:1px solid;background:transparent;
      font-family:'Cairo',sans-serif;white-space:nowrap}
    .btn-confirm{color:#86efac;border-color:rgba(34,197,94,.4)}
    .btn-confirm:hover{background:rgba(34,197,94,.15)}
    .btn-revert{color:#fcd34d;border-color:rgba(234,179,8,.4)}
    .btn-revert:hover{background:rgba(234,179,8,.1)}
    .btn-print-order{color:#c4b5fd;border-color:rgba(139,92,246,.4)}
    .btn-print-order:hover{background:rgba(139,92,246,.15)}
    .btn-delete-order{color:#fca5a5;border-color:rgba(239,68,68,.3)}
    .btn-delete-order:hover{background:rgba(239,68,68,.1)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .4s ease forwards}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-thumb{background:rgba(124,58,237,.4);border-radius:3px}
    @media print{
      body{background:#fff!important;color:#000!important}
      body::before{display:none}
      #loginScreen,#dashHeader,#statsRow,#searchRow,.action-btn,#exportBtn,#clearAllBtn{display:none!important}
      table{font-size:11px}
      th,td{border:1px solid #ccc!important;color:#000!important}
      thead tr{background:#f3f0ff!important}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-6 relative z-10">
  <div class="w-full max-w-sm glass rounded-3xl p-8 fade-up">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-red-600 to-purple-900 flex items-center justify-center text-2xl mx-auto mb-4">🔐</div>
      <h1 class="text-xl font-black">لوحة تحكم الإدارة</h1>
      <p class="text-purple-500 text-sm mt-1">PrintBag DZ — Admin Access</p>
    </div>
    <div class="space-y-4">
      <div><label class="block text-purple-400 text-xs font-bold mb-2">ادخل كلمة السر : <span class="text-amber-400 font-black mono">printbag</span></label>
        <input id="passwordInput" type="password" placeholder="printbag" class="field" onkeydown="if(event.key==='Enter')checkPassword()"/></div>
      <p id="loginError" class="text-red-400 text-sm text-center min-h-[1.2rem]"></p>
      <button onclick="checkPassword()" class="btn-purple w-full py-3 rounded-xl font-black text-lg">دخول</button>
    </div>
    <p class="text-center text-xs text-purple-900 mt-5">🔐 محمي بكلمة سر خاصة</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden relative z-10 min-h-screen">

  <header id="dashHeader" class="sticky top-0 z-50 glass border-b border-purple-900/40">
    <div class="max-w-[1500px] mx-auto px-5 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-red-600 to-purple-900 flex items-center justify-center text-base">🔐</div>
        <span class="font-black text-purple-100">Admin Dashboard — PrintBag DZ</span>
      </div>
      <div class="flex items-center gap-3">
        <button id="exportBtn" onclick="exportCSV()" class="action-btn btn-print-order text-sm px-4 py-2">📥 تصدير CSV</button>
        <button onclick="logout()" class="text-sm border border-purple-800 text-purple-400 hover:bg-purple-900/30 transition px-4 py-2 rounded-lg font-semibold">خروج</button>
      </div>
    </div>
  </header>

  <div class="max-w-[1500px] mx-auto px-4 py-8 space-y-6">

    <!-- Stats -->
    <div id="statsRow" class="grid grid-cols-2 sm:grid-cols-4 gap-4 fade-up">
      <div class="stat-card"><p class="text-purple-500 text-xs font-bold mb-2">إجمالي الطلبات</p><p id="sTotal" class="text-4xl font-black mono">0</p></div>
      <div class="stat-card"><p class="text-purple-500 text-xs font-bold mb-2">قيد المعالجة</p><p id="sPending" class="text-4xl font-black text-yellow-400 mono">0</p></div>
      <div class="stat-card"><p class="text-purple-500 text-xs font-bold mb-2">تم الإرسال</p><p id="sSent" class="text-4xl font-black text-green-400 mono">0</p></div>
      <div class="stat-card"><p class="text-purple-500 text-xs font-bold mb-2">إجمالي الإيرادات</p><p id="sRevenue" class="text-lg font-black text-purple-200 mono">0 دج</p></div>
    </div>

    <!-- Search -->
    <div id="searchRow" class="flex flex-col sm:flex-row gap-3 fade-up">
      <input id="searchInput" type="search" placeholder="🔍  ابحث بالاسم، الهاتف، الولاية، رقم الطلب..." class="field flex-1" oninput="renderTable()"/>
      <select id="filterStatus" class="field sm:w-48" onchange="renderTable()">
        <option value="">كل الحالات</option>
        <option value="قيد المعالجة">قيد المعالجة</option>
        <option value="تم الإرسال">تم الإرسال</option>
      </select>
      <button id="clearAllBtn" onclick="clearAllOrders()" class="action-btn btn-delete-order px-5 py-2.5 text-sm whitespace-nowrap">🗑️ حذف الكل</button>
    </div>

    <!-- Table -->
    <div class="glass rounded-2xl overflow-hidden fade-up">
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>الزبون</th><th>الولاية</th><th>العنوان</th>
              <th>تفاصيل الطلب</th><th>خيارات الطباعة</th><th>السعر الكلي</th>
              <th>الحالة</th><th>QR Code</th><th>التاريخ</th><th>إجراءات</th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td colspan="11" class="text-center py-16 text-purple-700">لا توجد طلبات بعد</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
  /* ════════════════════════
     🔒 كلمة السر
     ════════════════════════ */
  const ADMIN_PASSWORD = "printbag";
  const LS_KEY = "printbag_orders";

  function checkPassword(){
    if(document.getElementById("passwordInput").value===ADMIN_PASSWORD){
      sessionStorage.setItem("pb_admin","1");
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
      renderTable();
    }else{
      document.getElementById("loginError").textContent="كلمة السر غير صحيحة!";
      document.getElementById("passwordInput").value="";
    }
  }
  function logout(){sessionStorage.removeItem("pb_admin");location.reload();}
  if(sessionStorage.getItem("pb_admin")==="1"){
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
  }

  function getOrders(){return JSON.parse(localStorage.getItem(LS_KEY)||"[]");}

  function renderStats(orders){
    document.getElementById("sTotal").textContent=orders.length;
    document.getElementById("sPending").textContent=orders.filter(o=>o.status==="قيد المعالجة").length;
    document.getElementById("sSent").textContent=orders.filter(o=>o.status==="تم الإرسال").length;
    const rev=orders.reduce((s,o)=>s+(o.totalPrice||0),0);
    document.getElementById("sRevenue").textContent=rev.toLocaleString("ar-DZ")+" دج";
  }

  function renderTable(){
    const orders=getOrders();
    renderStats(orders);
    const q=document.getElementById("searchInput").value.toLowerCase();
    const status=document.getElementById("filterStatus").value;
    const filtered=orders.filter(o=>{
      const mq=!q||(o.fullName||"").toLowerCase().includes(q)||(o.phone||"").includes(q)||
        (o.wilaya||"").toLowerCase().includes(q)||(o.orderId||"").toLowerCase().includes(q)||
        (o.address||"").toLowerCase().includes(q);
      return mq&&(!status||o.status===status);
    });
    const tbody=document.getElementById("ordersBody");
    if(!filtered.length){
      tbody.innerHTML=`<tr><td colspan="11" class="text-center py-16 text-purple-700">لا توجد نتائج</td></tr>`;
      return;
    }
    tbody.innerHTML=filtered.map((o,i)=>{
      const isPending=o.status==="قيد المعالجة";
      return`<tr>
        <td class="text-purple-600 text-xs mono">${i+1}</td>
        <td><p class="font-bold text-white text-sm">${esc(o.fullName)}</p>
          <p class="text-purple-500 text-xs mono mt-0.5">${esc(o.phone)}</p>
          <p class="text-purple-700 text-xs">${esc(o.shopName||"")}</p></td>
        <td class="text-purple-200 text-sm">${esc(o.wilaya)}</td>
        <td><p class="text-purple-300 text-xs max-w-[140px] leading-relaxed">${esc(o.address||"—")}</p></td>
        <td><p class="text-white text-sm font-bold">${esc(o.bagType)}</p>
          <p class="text-purple-400 text-xs mt-0.5">${esc(o.bagSize)} — ${(o.quantity||0).toLocaleString()} حبة</p></td>
        <td class="text-xs">
          <span class="${o.rectoVerso?"text-green-400":"text-purple-700"}">${o.rectoVerso?"✅ وجهين":"❌ وجه"}</span><br/>
          <span class="${o.color2?"text-green-400":"text-purple-700"}">${o.color2?"✅ لونين":"❌ لون واحد"}</span></td>
        <td><p class="text-white font-black text-base mono">${(o.totalPrice||0).toLocaleString("ar-DZ")} دج</p>
          <p class="text-purple-600 text-xs">${(o.unitPrice||0)} دج/حبة</p></td>
        <td><span class="badge ${isPending?"badge-pending":"badge-sent"}">${esc(o.status)}</span></td>
        <td><div id="qr-admin-${o.orderId.replace(/[^a-zA-Z0-9]/g,"-")}" class="w-16 h-16"></div></td>
        <td class="text-purple-600 text-xs">${esc(o.createdAtDisplay||o.createdAt?.slice(0,10)||"—")}</td>
        <td><div class="flex flex-col gap-1.5">
          ${isPending
            ?`<button class="action-btn btn-confirm" onclick="setStatus('${o.orderId}','تم الإرسال')">✓ تم الإرسال</button>`
            :`<button class="action-btn btn-revert" onclick="setStatus('${o.orderId}','قيد المعالجة')">↩ إعادة معالجة</button>`}
          <button class="action-btn btn-print-order" onclick="printSingleOrder('${o.orderId}')">🖨️ طباعة</button>
          <button class="action-btn btn-delete-order" onclick="deleteOrder('${o.orderId}')">🗑️ حذف</button>
        </div></td>
      </tr>`;
    }).join("");

    // Render QR codes
    requestAnimationFrame(async()=>{
      for(const o of filtered){
        const domId="qr-admin-"+o.orderId.replace(/[^a-zA-Z0-9]/g,"-");
        const el=document.getElementById(domId);
        if(!el)continue;
        try{
          if(o.qrDataUrl){
            const img=document.createElement("img");
            img.src=o.qrDataUrl;img.className="w-16 h-16 rounded";
            el.appendChild(img);
          }else{
            const canvas=document.createElement("canvas");
            el.appendChild(canvas);
            await QRCode.toCanvas(canvas,o.orderId,{width:64,margin:1,color:{dark:"#1a0040",light:"#ffffff"}});
          }
        }catch(e){}
      }
    });
  }

  function setStatus(orderId,newStatus){
    const orders=getOrders();
    const idx=orders.findIndex(o=>o.orderId===orderId);
    if(idx>-1){orders[idx].status=newStatus;localStorage.setItem(LS_KEY,JSON.stringify(orders));renderTable();}
  }

  function deleteOrder(orderId){
    if(!confirm("هل تريد حذف هذا الطلب نهائياً؟"))return;
    localStorage.setItem(LS_KEY,JSON.stringify(getOrders().filter(o=>o.orderId!==orderId)));
    renderTable();
  }

  function clearAllOrders(){
    if(!confirm("⚠️ هل تريد حذف جميع الطلبات نهائياً؟"))return;
    localStorage.removeItem(LS_KEY);renderTable();
  }

  function printSingleOrder(orderId){
    const o=getOrders().find(x=>x.orderId===orderId);
    if(!o)return;
    const win=window.open("","_blank","width=640,height=800");
    win.document.write(`<!DOCTYPE html><html dir="rtl"><head>
      <meta charset="UTF-8"/><title>طلب ${o.orderId}</title>
      <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"/>
      <style>
        body{font-family:'Cairo',sans-serif;padding:30px;color:#111;background:#fff}
        h1{color:#4c1d95;margin-bottom:20px;font-size:1.2rem}
        table{width:100%;border-collapse:collapse;margin-bottom:20px}
        td{padding:9px 13px;border:1px solid #ddd}
        td:first-child{font-weight:700;background:#f5f3ff;width:40%}
        .total{font-size:1.4rem;font-weight:900;color:#4c1d95}
        .qr-wrap{text-align:center;margin-top:20px}
        .status{display:inline-block;padding:3px 12px;border-radius:999px;
          background:${o.status==="تم الإرسال"?"#dcfce7":"#fef9c3"};
          color:${o.status==="تم الإرسال"?"#166534":"#854d0e"};font-weight:700}
        @media print{button{display:none}}
      </style>
      <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"><\/script>
    </head><body>
      <h1>🛍️ PrintBag DZ — تفاصيل الطلب</h1>
      <table>
        <tr><td>رقم الطلب</td><td style="font-family:monospace">${o.orderId}</td></tr>
        <tr><td>الاسم الكامل</td><td>${o.fullName}</td></tr>
        <tr><td>رقم الهاتف</td><td style="font-family:monospace">${o.phone}</td></tr>
        <tr><td>الولاية</td><td>${o.wilaya}</td></tr>
        <tr><td>عنوان الشحن</td><td>${o.address||"—"}</td></tr>
        <tr><td>اسم المحل</td><td>${o.shopName||"—"}</td></tr>
        <tr><td>نوع المنتج</td><td>${o.bagType}</td></tr>
        <tr><td>المقاس</td><td>${o.bagSize}</td></tr>
        <tr><td>الكمية</td><td>${(o.quantity||0).toLocaleString()} حبة</td></tr>
        <tr><td>طباعة وجهين</td><td>${o.rectoVerso?"✅ نعم (+12 دج)":"❌ لا"}</td></tr>
        <tr><td>لون ثاني</td><td>${o.color2?"✅ نعم (+15 دج)":"❌ لا"}</td></tr>
        <tr><td>سعر الوحدة</td><td>${o.unitPrice} دج</td></tr>
        <tr><td>المجموع الكلي</td><td class="total">${(o.totalPrice||0).toLocaleString("ar-DZ")} دج</td></tr>
        <tr><td>الحالة</td><td><span class="status">${o.status}</span></td></tr>
        <tr><td>التاريخ</td><td>${o.createdAtDisplay||o.createdAt?.slice(0,10)||"—"}</td></tr>
        ${o.designNotes?`<tr><td>ملاحظات التصميم</td><td>${o.designNotes}</td></tr>`:""}
      </table>
      <div class="qr-wrap">
        <p style="color:#666;font-size:12px;margin-bottom:8px;font-weight:bold">QR Code — رقم الطلب</p>
        <canvas id="qrPrint"></canvas>
        <p style="font-family:monospace;font-size:11px;color:#888;margin-top:6px">${o.orderId}</p>
      </div>
      <script>
        QRCode.toCanvas(document.getElementById("qrPrint"),"${o.orderId}",
          {width:160,margin:2,color:{dark:"#1a0040",light:"#ffffff"}},
          ()=>window.addEventListener("load",()=>window.print())
        );
      <\/script>
    </body></html>`);
    win.document.close();
  }

  function exportCSV(){
    const orders=getOrders();
    if(!orders.length){alert("لا توجد طلبات للتصدير!");return;}
    const headers=["رقم الطلب","الاسم","الهاتف","الولاية","العنوان","المحل","نوع المنتج","المقاس","الكمية","سعر الوحدة","المجموع","وجهين","لون ثاني","الحالة","التاريخ"];
    const rows=orders.map(o=>[
      o.orderId,o.fullName,o.phone,o.wilaya,o.address||"",o.shopName||"",
      o.bagType,o.bagSize,o.quantity,o.unitPrice,o.totalPrice,
      o.rectoVerso?"نعم":"لا",o.color2?"نعم":"لا",o.status,
      o.createdAtDisplay||o.createdAt?.slice(0,10)||""
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`));
    const csv="\uFEFF"+[headers.join(","),...rows.map(r=>r.join(","))].join("\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
    a.download=`printbag-orders-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }

  function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

  if(sessionStorage.getItem("pb_admin")==="1") renderTable();
</script>
</body>
</html>
